version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    networks:
      - ragchatbot-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragchatbot-backend
    ports:
      - "5000:5000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-ragchatbot}
      - QDRANT_DISTANCE=${QDRANT_DISTANCE:-Cosine}
      - QDRANT_VECTOR_SIZE=${QDRANT_VECTOR_SIZE:-4096}
      - PORT=5000
    depends_on:
      - qdrant
    networks:
      - ragchatbot-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragchatbot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ragchatbot-network

volumes:
  qdrant_storage:

networks:
  ragchatbot-network:
    driver: bridge
